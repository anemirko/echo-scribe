spring:
  application:
    name: echo-scribe
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB
app:
  transcription:
    ffmpeg-command: ffmpeg
    ffprobe-command: ffprobe
    whisper-command: whisper-cli
    whisper-model-path: "/path/to/ggml-base.bin" # change to a readable whisper.cpp model path
    temp-dir: "build/tmp/echo-scribe"
    url-input-enabled: true
    downloader-command: yt-dlp
    request-timeout-seconds: 1200
    download-cache-ttl: 12h
    language-detection-sample-seconds: 20
  logging:
    directory: logs
management:
  endpoints:
    web:
      exposure:
        include: health,info
